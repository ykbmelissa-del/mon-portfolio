<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Dashboard IoT — Melissa</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 30px; }
    h1 { color: #38bdf8; margin-bottom: 5px; }
    p { color: #94a3b8; margin-bottom: 30px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; text-align: center; }
    .card h3 { color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px; }
    .card .value { font-size: 2rem; font-weight: bold; color: #38bdf8; }
 
    .chart-box { background: #1e293b; border-radius: 12px; padding: 20px; }
       .progress {
  width: 100%;
  height: 8px;
  background: #334155;
  border-radius: 4px;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.alerte {
  background: #f87171;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-weight: bold;
  display: none;
}
  </style>
</head>
<body>
  <div class="alerte" id="alerte">
  ⚠️ ALERTE — Température critique détectée !
</div>
  <h1>Dashboard IoT — ESP32 Monitor</h1>
  <p>Données en temps réel · Mis à jour toutes les secondes</p>

  <div class="cards">
   <div class="card">
  <h3>Température</h3>
  <div class="value" id="temp">--°C</div>
  <div class="progress">
    <div class="progress-fill" id="temp-bar" style="width:0%"></div>
  </div>
</div>
    <div class="card">
  <h3>Humidité</h3>
  <div class="value" id="hum">--%</div>
  <div class="progress">
    <div class="progress-fill" id="hum-bar" style="width:0%"></div>
  </div>
</div>
    <div class="card">
      <h3>Statut</h3>
      <div class="value" style="color:#4ade80" id="status">EN LIGNE</div>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="myChart"></canvas>
  </div>

  <script>
    const labels = [];
    const tempData = [];
    const humData = [];

    const ctx = document.getElementById('myChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Température (°C)', data: tempData, borderColor: '#38bdf8', tension: 0.4, fill: false },
          { label: 'Humidité (%)', data: humData, borderColor: '#4ade80', tension: 0.4, fill: false }
        ]
      },
      options: {
        responsive: true,
        animation: false,
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, min: 0, max: 100 }
        },
        plugins: { legend: { labels: { color: '#94a3b8' } } }
      }
    });

    function update() {
      const now = new Date().toLocaleTimeString();
      const temp = Math.round(20 + Math.random() * 15);
      const hum = Math.round(40 + Math.random() * 40);

      document.getElementById('temp').textContent = temp + '°C';
      const bar = document.getElementById('temp-bar');
bar.style.width = (temp - 20) * 6.67 + '%';
bar.style.background = temp > 30 ? '#f87171' : '#38bdf8';
const alerte = document.getElementById('alerte');
if (temp > 32) {
  alerte.style.display = 'block';
} else {
  alerte.style.display = 'none';
}
      document.getElementById('hum').textContent = hum + '%';
   const humBar = document.getElementById('hum-bar');
humBar.style.width = hum + '%';
humBar.style.background = hum > 70 ? '#f87171' : '#4ade80';
      labels.push(now);
      tempData.push(temp);
      humData.push(hum);

      if (labels.length > 20) {
        labels.shift();
        tempData.shift();
        humData.shift();
      }

      chart.update();
    }

    setInterval(update, 1000);
    update();
  </script>
</body>
</html>
